# ═══════════════════════════════════════════════════════════════════════════════
# CreatorBharat SaaS — Docker Compose (Production)
# Usage:
#   1. Copy .env.production from root (cp .env.production .env)
#   2. docker-compose up -d --build
#   3. For SSL: docker-compose run --rm certbot certonly --webroot ...
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── Backend API Server ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./creatorbharat-backend
      dockerfile: Dockerfile
    container_name: creatorbharat_api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./creatorbharat-backend/.env
    environment:
      NODE_ENV: production
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - creatorbharat_net

  # ── Frontend (Nginx serving Vite production build) ────────────────────────────
  frontend:
    build:
      context: ./creator-bharat-v3
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.creatorbharat.com/api}
        - VITE_ENV=production
        - VITE_AUTH_MODE=api
        - VITE_WEB3FORMS_KEY=${VITE_WEB3FORMS_KEY}
        - VITE_RAZORPAY_KEY_ID=${VITE_RAZORPAY_KEY_ID}
        - VITE_SENTRY_DSN=${VITE_SENTRY_DSN}
    container_name: creatorbharat_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - creatorbharat_net

  # ── Admin Panel ───────────────────────────────────────────────────────────────
  admin:
    build:
      context: ./creatorbharat-admin
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://api.creatorbharat.com/api}
    container_name: creatorbharat_admin
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - creatorbharat_net

  # ── Certbot (Auto SSL via Let's Encrypt) ─────────────────────────────────────
  # Initial setup: docker-compose run --rm certbot certonly --webroot \
  #   -w /var/www/certbot -d creatorbharat.com -d www.creatorbharat.com \
  #   --email admin@creatorbharat.com --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    container_name: creatorbharat_certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - creatorbharat_net

volumes:
  uploads_data:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  creatorbharat_net:
    driver: bridge
