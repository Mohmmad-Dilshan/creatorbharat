name: CreatorBharat CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    name: Backend Build & Generate Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: creatorbharat-backend/package-lock.json

      - name: Install Backend Dependencies
        env:
          DATABASE_URL: "postgresql://mockuser:mockpass@localhost:5432/mockdb"
        run: |
          cd creatorbharat-backend
          npm ci

      - name: Build Success Notification
        run: echo "✅ Backend dependencies and Prisma client generated successfully!"

  admin:
    name: Admin Dashboard Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: creatorbharat-admin/package-lock.json

      - name: Install Admin Dependencies
        run: |
          cd creatorbharat-admin
          npm ci

      - name: Verify Admin Production Build
        run: |
          cd creatorbharat-admin
          npm run build

      - name: Build Success Notification
        run: echo "✅ Admin dashboard build passed successfully!"

  frontend:
    name: Frontend Client Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: creator-bharat-v3/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd creator-bharat-v3
          npm ci

      - name: Verify Frontend Production Build
        run: |
          cd creator-bharat-v3
          npm run build

      - name: Build Success Notification
        run: echo "✅ Frontend build passed successfully!"

  docker-build:
    name: Docker Images Build Check
    runs-on: ubuntu-latest
    needs: [backend, admin, frontend]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./creatorbharat-backend
          file: ./creatorbharat-backend/Dockerfile
          push: false
          tags: creatorbharat-backend:latest

      - name: Build Admin Image
        uses: docker/build-push-action@v5
        with:
          context: ./creatorbharat-admin
          file: ./creatorbharat-admin/Dockerfile
          push: false
          tags: creatorbharat-admin:latest
          build-args: |
            VITE_API_URL=http://localhost:4000/api

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./creator-bharat-v3
          file: ./creator-bharat-v3/Dockerfile
          push: false
          tags: creator-bharat-v3:latest
          build-args: |
            VITE_API_URL=http://localhost:4000/api
            VITE_ENV=production
            VITE_AUTH_MODE=api
            VITE_WEB3FORMS_KEY=your_web3forms_key_here

      - name: Build Success Notification
        run: echo "✅ All Docker images compiled successfully!"

