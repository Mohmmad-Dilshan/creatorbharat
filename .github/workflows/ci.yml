name: CreatorBharat CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: creator-bharat-v3/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd creator-bharat-v3
          npm ci

      - name: Verify Frontend Production Build
        run: |
          cd creator-bharat-v3
          npm run build

  backend:
    name: Backend Build & Schema Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: creatorbharat-backend/package-lock.json

      - name: Install Backend Dependencies
        run: |
          cd creatorbharat-backend
          npm ci

      - name: Generate Prisma Client Schema
        run: |
          cd creatorbharat-backend
          npx prisma generate
