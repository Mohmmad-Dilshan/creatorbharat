    <style>
      body { background-color: #fcfcfc; margin: 0; padding: 0; }
      #root { background-color: #fcfcfc; min-height: 100vh; }
      
      /* Hide the default Google Translate widget */
      .skiptranslate { display: none !important; }
      body { top: 0px !important; }
    </style>
  </head>
  <body>
    <div id="google_translate_element" style="opacity:0; position:absolute; z-index:-1; pointer-events:none;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({pageLanguage: 'en', autoDisplay: false}, 'google_translate_element');
      }

      (function() {
        function ensureAttributes() {
          var select = document.querySelector('.goog-te-combo');
          if (select) {
            if (select.id !== 'goog-te-combo-select') {
              select.setAttribute('id', 'goog-te-combo-select');
            }
            if (select.name !== 'goog-te-combo-select') {
              select.setAttribute('name', 'goog-te-combo-select');
            }
          }
        }
        
        // Continuous polling as fallback
        setInterval(ensureAttributes, 150);

        // Mutation observer to apply attributes as soon as elements change
        var observer = new MutationObserver(function() {
          ensureAttributes();
        });
        observer.observe(document.documentElement, {
          childList: true,
          subtree: true
        });
      })();
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
